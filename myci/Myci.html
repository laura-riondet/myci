<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Myci — The network beneath your street</title>

<!-- Type: Alfa Slab One (display — Grouch substitute), Cutive (typewriter labels), Cutive Mono (chrome), Trocchi (slab body) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Cutive&family=Cutive+Mono&family=Trocchi&display=swap" rel="stylesheet" />
<!-- Landing-page faces (Fraunces display · Hanken Grotesk UI · Space Mono eyebrows) — shared with index.html so the app landing matches it -->
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

<!-- Phosphor icons (regular / bold / fill) -->
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />

<!-- Leaflet (OpenStreetMap) — the Map tab -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

<!-- Shared design system (palette tokens, fonts, grain, keyframes) -->
<link rel="stylesheet" href="globals.css" />

<style>
  html, body { height: 100%; }
  body {
    background:
      radial-gradient(120% 90% at 50% 0%, #2e2016 0%, #1c130b 70%, #140d07 100%);
    font-family: 'Trocchi', serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }

  /* ── Fit-to-viewport stage ── */
  #stage {
    position: fixed; inset: 0; display: grid; place-items: center;
    overflow: hidden;
  }
  /* faint mycelium watermark behind the device */
  #stage::before {
    content: ""; position: absolute; inset: -10%;
    background-image:
      radial-gradient(circle at 20% 30%, #d6ad0810 0 2px, transparent 3px),
      radial-gradient(circle at 70% 60%, #8ca67910 0 2px, transparent 3px),
      radial-gradient(circle at 45% 85%, #b2750010 0 2px, transparent 3px);
    background-size: 220px 220px, 260px 260px, 300px 300px;
    opacity: .6; pointer-events: none;
  }
  #scaler { transform-origin: center center; }

  /* ── Device frame ── */
  #device {
    width: 390px; height: 844px; position: relative;
    border-radius: 46px; padding: 11px;
    background: linear-gradient(155deg, #5a3a24, #3a2418 60%, #2a1810);
    box-shadow:
      0 2px 2px rgba(255,255,255,.18) inset,
      0 -3px 8px rgba(0,0,0,.5) inset,
      0 40px 80px rgba(0,0,0,.6),
      0 12px 30px rgba(0,0,0,.5);
  }
  #screen {
    position: absolute; inset: 11px; border-radius: 36px; overflow: hidden;
    background: #3A2A1E;
    box-shadow: 0 0 0 2px #1c130b, 0 0 0 3px #6b4a30;
  }
  /* Dynamic Island notch */
  #notch {
    position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 122px; height: 30px; background: #1c130b; border-radius: 0 0 18px 18px;
    z-index: 70; pointer-events: none;
  }
  #app { position: absolute; inset: 0; }

  /* ── Scrollbar suppression ── */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }
  #screen *::-webkit-scrollbar { width: 0; height: 0; }
  #screen * { scrollbar-width: none; }

  .grainoff .om-grain { display: none !important; }

  /* ── Leaflet (Map tab): warm the OSM tiles into the 70s earth palette ── */
  .myci-map { background: #3a2a1a; }
  .myci-map .leaflet-tile {
    filter: sepia(.42) saturate(.78) brightness(.92) contrast(.96) hue-rotate(-8deg);
  }
  .myci-map .leaflet-container { background: #3a2a1a; font-family: 'Cutive Mono', monospace; }
  .myci-map .leaflet-bar a {
    background: #2a1a0ecc; color: #FEF4D6; border-bottom-color: #ffffff22;
  }
  .myci-map .leaflet-bar a:hover { background: #472c1c; }
  .myci-map .leaflet-control-attribution {
    background: #2a1a0eb0; color: #cbb085; font-size: 9px;
  }
  /* lift the bottom controls (OSM attribution) clear of the app's bottom nav */
  .myci-map .leaflet-bottom { bottom: 78px; }
  /* …but the onboarding mini-map has no bottom nav under it — sit controls flush */
  .myci-map-mini .leaflet-bottom { bottom: 0; }
  .myci-map-mini .leaflet-control-attribution { font-size: 8px; padding: 0 4px; }
  .myci-map .leaflet-control-attribution a { color: #e3a81b; }
  /* the just-completed exchange glows so you spot the thread that grew */
  .myci-map .myci-thread-fresh { filter: drop-shadow(0 0 2px #f2c94c); }

  input, textarea, button { font-family: inherit; }
  input::placeholder, textarea::placeholder { color: #a98f68; }

  /* Shared keyframes live in globals.css. App-specific transitions below. */

  /* ── Screen transitions (transform-only: content always visible at rest) ── */
  .screen-anim { animation-duration: .34s; animation-timing-function: cubic-bezier(.22,.61,.36,1); animation-fill-mode: both; }
  .anim-push   { animation-name: slideInRight; }
  .anim-pop    { animation-name: slideInLeft; }
  .anim-fade   { animation-name: fadeUp; }
  .anim-modal  { animation-name: slideUpScale; }

  /* ── Element animations ── */
  .rise     { animation: riseUp .5s cubic-bezier(.22,.61,.36,1) both; }
  .sheet-up { animation: sheetUp .32s cubic-bezier(.22,.61,.36,1) both; }

  /* ── Interactive affordances ── */
  .fab-btn  { transition: transform .12s; }
  .fab-btn:active { transform: scale(.9) !important; }
  .nav-item:active { transform: scale(.94); }

  /* ── Landing mycelium idle life ── */
  .myc-flow { animation-name: mycFlow; animation-timing-function: linear; animation-iteration-count: infinite; }
  .myc-grow { animation: mycGrow 12s ease-in-out infinite; }

  /* ── Mobile: strip the decorative phone frame ── */
  @media (max-width: 600px) {
    #stage { display: block; }
    #scaler { transform: none !important; }
    #device {
      width: 100vw; height: 100dvh;
      border-radius: 0; padding: 0;
      background: none; box-shadow: none;
    }
    #screen { inset: 0; border-radius: 0; box-shadow: none; }
    #notch { display: none; }
  }

  /* ── Reduced-motion safety net ── */
  @media (prefers-reduced-motion: reduce) {
    @keyframes growThread { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 0; } }
    @keyframes youPulse   { 0%,100% { opacity: .8; transform: scale(1); } 50% { opacity: .8; transform: scale(1); } }
    .screen-anim, .rise, .sheet-up { animation-duration: .001ms !important; }
    .myc-flow, .myc-grow { animation: none !important; }
    .myc-grow { opacity: .5 !important; stroke-dashoffset: 0 !important; }
  }
</style>
</head>
<body>
  <!-- Bundler thumbnail / no-JS fallback -->
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="#472C1C"/>
      <g stroke="#D6AD08" stroke-width="0.8" fill="none" opacity="0.7">
        <path d="M50 50 C40 40 34 34 30 30"/><path d="M50 50 C60 42 68 38 72 34"/>
        <path d="M50 50 C46 62 44 70 42 76"/><path d="M50 50 C62 56 70 60 76 62"/>
      </g>
      <g fill="#FEF4D6"><circle cx="30" cy="30" r="2"/><circle cx="72" cy="34" r="2"/><circle cx="42" cy="76" r="2"/><circle cx="76" cy="62" r="2"/></g>
      <circle cx="50" cy="50" r="4" fill="#D6AD08"/>
    </svg>
  </template>

  <div id="stage">
    <div id="scaler">
      <div id="device">
        <div id="screen">
          <div id="notch"></div>
          <div id="app"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Fit-to-viewport scaling -->
  <script>
    (function () {
      var scaler = document.getElementById('scaler');
      function fit() {
        var pad = 24;
        var s = Math.min((innerWidth - pad) / 390, (innerHeight - pad) / 844, 1.18);
        scaler.style.transform = 'scale(' + s + ')';
      }
      window.addEventListener('resize', fit);
      fit();
    })();
  </script>

  <!-- React + Babel (pinned versions for reproducibility) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Leaflet runtime (global `L`) — loads before the babel screens that use it -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!--
    Load order matters: each file places its exports on window.
    data → ui primitives → postcard → screen layers → app shell
  -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="myci-data.jsx"></script>
  <script type="text/babel" src="myci-i18n.jsx"></script>
  <script type="text/babel" src="myci-ui.jsx"></script>
  <script type="text/babel" src="myci-auth-ui.jsx"></script>
  <script type="text/babel" src="myci-postcard.jsx"></script>
  <script type="text/babel" src="myci-screens-intro.jsx"></script>
  <script type="text/babel" src="myci-screens-feed.jsx"></script>
  <script type="text/babel" src="myci-screens-map.jsx"></script>
  <script type="text/babel" src="myci-screens-detail.jsx"></script>
  <script type="text/babel" src="myci-app.jsx"></script>
</body>
</html>
